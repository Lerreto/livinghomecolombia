# ---- HTTP: reto de Certbot + redirección a HTTPS ----
server {
    listen 80;
    server_name livinghomecolombia.com www.livinghomecolombia.com crm.livinghomecolombia.com;

    # Certbot escribe aquí los archivos de validación
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Healthcheck del contenedor (NO se redirige)
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Todo lo demás -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS: sitio web ----
server {
    listen 443 ssl;
    http2 on;
    server_name livinghomecolombia.com www.livinghomecolombia.com;

    ssl_certificate     /etc/letsencrypt/live/livinghomecolombia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/livinghomecolombia.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ---- HTTPS: EspoCRM (proxy al contenedor crm) ----
server {
    listen 443 ssl;
    http2 on;
    server_name crm.livinghomecolombia.com;

    ssl_certificate     /etc/letsencrypt/live/livinghomecolombia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/livinghomecolombia.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50m;   # adjuntos en EspoCRM

    location / {
        proxy_pass         http://crm:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }
}
