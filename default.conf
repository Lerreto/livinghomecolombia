server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Sirve los archivos; si no existe la ruta, cae en index.html
    # (útil si más adelante usas una SPA tipo React/Vue).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Endpoint para el healthcheck del contenedor
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
