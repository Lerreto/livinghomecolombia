# Configuración de PRODUCCIÓN (nginx reverse proxy + Certbot).
# PRIMERA VEZ: corre  ./init-letsencrypt.sh  (crea los certificados).
# Después:     docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# nginx enruta:
#   livinghomecolombia.com / www  -> sitio estático
#   crm.livinghomecolombia.com    -> EspoCRM (proxy interno a crm:80)
# Certbot obtiene y renueva los certificados de Let's Encrypt.

services:
  web:
    # nginx recarga cada 6h para tomar certificados renovados.
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"

  crm:
    environment:
      ESPOCRM_SITE_URL: "https://crm.livinghomecolombia.com"

  certbot:
    image: certbot/certbot
    container_name: lhc_certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Intenta renovar cada 12h.
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
