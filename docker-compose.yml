# Configuración BASE: común a local y producción.
# Nota: la config de nginx se monta en cada entorno (override/prod),
# porque local sirve estático y prod hace de reverse proxy con SSL.

services:
  web:
    image: nginx:1.27-alpine
    container_name: lhc_web
    restart: unless-stopped
    volumes:
      - ./web:/usr/share/nginx/html:ro
    networks:
      - lhc_net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  crm-db:
    image: mariadb:11
    container_name: lhc_crm_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${CRM_DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${CRM_DB_NAME}
      MARIADB_USER: ${CRM_DB_USER}
      MARIADB_PASSWORD: ${CRM_DB_PASSWORD}
    volumes:
      - crm_db_data:/var/lib/mysql
    networks:
      - lhc_net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 20s
      start_period: 10s
      timeout: 10s
      retries: 3

  crm:
    image: espocrm/espocrm:9.3
    container_name: lhc_crm
    restart: unless-stopped
    environment:
      ESPOCRM_DATABASE_PLATFORM: Mysql
      ESPOCRM_DATABASE_HOST: crm-db
      ESPOCRM_DATABASE_NAME: ${CRM_DB_NAME}
      ESPOCRM_DATABASE_USER: ${CRM_DB_USER}
      ESPOCRM_DATABASE_PASSWORD: ${CRM_DB_PASSWORD}
      ESPOCRM_ADMIN_USERNAME: ${CRM_ADMIN_USER}
      ESPOCRM_ADMIN_PASSWORD: ${CRM_ADMIN_PASSWORD}
    volumes:
      - crm_data:/var/www/html
    networks:
      - lhc_net
    depends_on:
      crm-db:
        condition: service_healthy

  crm-daemon:
    image: espocrm/espocrm:9.3
    container_name: lhc_crm_daemon
    restart: unless-stopped
    volumes:
      - crm_data:/var/www/html
    networks:
      - lhc_net
    depends_on:
      - crm
    entrypoint: docker-daemon.sh

networks:
  lhc_net:
    driver: bridge

volumes:
  crm_db_data:
  crm_data:
